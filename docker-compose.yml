version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: alphaaegis-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphaaegis-backend
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///dev.db
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alphaaegis-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
