services:
  redis:
    image: redis:alpine
    container_name: alphaaegis-redis
    ports:
      - "6379:6379"
    restart: always

  # alphaaegis-ib-gateway:
    # platform: linux/amd64
    # image: waytrade/ib-gateway:latest
    # container_name: alphaaegis-ib-gateway
    # ports:
      # - "4002:4002"
      # - "5900:5900"
    # environment:
      # TWS_USERID: ""
      # TWS_PASSWORD: ""
      # TRADING_MODE: paper
      # VNC_SERVER_PASSWORD: vncpass
    # restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphaaegis-backend
    environment:
      - REDIS_URL=redis://alphaaegis-redis:6379
      - DATABASE_URL=sqlite:///dev.db
      - IB_HOST=127.0.0.1
      - IB_PORT=4002
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - alphaaegis-ib-gateway
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alphaaegis-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
